<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Calendar body -->
  <rect x="4" y="8" width="32" height="28" rx="4" fill="#2563EB" opacity="0.15"/>
  <rect x="4" y="8" width="32" height="28" rx="4" stroke="#3B82F6" stroke-width="1.5" fill="none"/>
  <!-- Calendar top bar -->
  <rect x="4" y="8" width="32" height="8" rx="4" fill="#3B82F6"/>
  <!-- Calendar hooks -->
  <line x1="13" y1="5" x2="13" y2="12" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="5" x2="27" y2="12" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <!-- Signal bars inside calendar -->
  <rect x="11" y="28" width="3" height="5" rx="1" fill="#60A5FA"/>
  <rect x="16" y="25" width="3" height="8" rx="1" fill="#3B82F6"/>
  <rect x="21" y="22" width="3" height="11" rx="1" fill="#2563EB"/>
  <rect x="26" y="19" width="3" height="14" rx="1" fill="#1D4ED8"/>
</svg>
